[runpod]
name = "qwen-image-runpod"
dockerfile = "Dockerfile"

# Qwen image generation is an 80 GB VRAM class workload.
gpu_types = [
  "NVIDIA A100 80GB PCIe",
  "NVIDIA H100 PCIe",
  "NVIDIA H100 HBM3",
  "NVIDIA H100 NVL",
  "NVIDIA RTX 6000 Ada Generation Blackwell Server Edition",
  "NVIDIA RTX 6000 Ada Generation Blackwell Workstation Edition",
  "NVIDIA RTX Pro 6000 Blackwell Max-Q Workstation Edition"
]
min_vram_gb = 80

# Keep some headroom on the root filesystem for image layers and runtime overhead.
container_disk_gb = 150

# First-time downloads are slow. Give the worker enough time to come up cleanly.
execution_timeout = 1800

# With container-disk caching only, keeping one worker warm avoids repeated model downloads.
min_workers = 1
max_workers = 1
scale_down_delay = 300
